vector:
  role: "Agent"
  customConfig:
    api:
      enabled: true
      address: "0.0.0.0:8687"
    sources:
      kubernetes_logs:
        type: kubernetes_logs
        extra_label_selector: "app.kubernetes.io/name in (cortex-app, cortex-ingestion)"
    transforms:
      parse_json:
        type: remap
        inputs:
          - kubernetes_logs
        source: |
          parsed, err = parse_json(.message)
          if err == null {
            . = merge!(., parsed)
          }
          .kubernetes_namespace = .kubernetes.pod_namespace
          .kubernetes_pod = .kubernetes.pod_name
          .kubernetes_container = .kubernetes.container_name
    sinks:
      clickhouse_logs:
        type: clickhouse
        inputs:
          - parse_json
        endpoint: "http://clickhouse-cluster01.clickhouse.svc.cluster.local:8123"
        database: cortex
        table: cortex_logs_distributed
        compression: gzip
        skip_unknown_fields: true
        batch:
          max_bytes: 10485760
          timeout_secs: 5
        buffer:
          type: memory
          max_events: 10000
          when_full: block

        auth:
          strategy: basic
          user: default
          password: "gdfsgrt3t2234fd"
  service:
    enabled: true
    ports:
      - name: api
        port: 8687
        targetPort: 8687
        protocol: TCP
  ingress:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    type: emptyDir
  tolerations:
    - operator: Exists
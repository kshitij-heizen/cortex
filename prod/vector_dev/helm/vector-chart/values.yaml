vector:
  role: "Agent"

  customConfig:
    data_dir: /vector-data-dir
    api:
      enabled: true
      address: "0.0.0.0:8687"

    sources:
      kubernetes_logs:
        type: kubernetes_logs
        extra_label_selector: "app.kubernetes.io/name in (cortex-app, cortex-ingestion)"

    transforms:
      parse_json:
        type: remap
        inputs:
          - kubernetes_logs
        source: |
          raw_msg = string!(.message)
          parsed, err = parse_json(raw_msg)
          if err == null {
            . = merge!(., parsed)
          }
          .message = raw_msg

          .timestamp = format_timestamp!(.timestamp, format: "%Y-%m-%d %H:%M:%S%.3f")

          .k8s_namespace = to_string(.kubernetes.pod_namespace) ?? ""
          .k8s_pod_name = to_string(.kubernetes.pod_name) ?? ""
          .k8s_pod_uid = to_string(.kubernetes.pod_uid) ?? ""
          .k8s_container_name = to_string(.kubernetes.container_name) ?? ""
          .k8s_container_image = to_string(.kubernetes.container_image) ?? ""
          .k8s_node_name = to_string(.kubernetes.pod_node_name) ?? ""
          .k8s_cluster = "heizen-eks-cluster"
          .k8s_labels = .kubernetes.pod_labels

          if !exists(.level) { .level = "info" }
          if !exists(.service_name) { .service_name = "" }
          if !exists(.environment) { .environment = "prod" }
          if !exists(.hostname) { .hostname = .k8s_pod_name }
          if !exists(.log_type) { .log_type = "stdout" }
          .agent_version = "vector-0.42.0"

          del(.kubernetes)
          del(.file)
          del(.source_type)
          del(.kubernetes_namespace)
          del(.kubernetes_pod)
          del(.kubernetes_container)
          del(.stream)

    sinks:
      clickhouse_logs:
        type: clickhouse
        inputs:
          - parse_json
        endpoint: "http://clickhouse-cluster01.clickhouse.svc.cluster.local:8123"
        database: cortex
        table: cortex_logs_distributed
        compression: gzip
        skip_unknown_fields: true
        batch:
          max_bytes: 10485760
          timeout_secs: 5
        buffer:
          type: memory
          max_events: 10000
          when_full: block
        auth:
          strategy: basic
          user: default
          password: "gdfsgrt3t2234fd"

  service:
    enabled: true
    ports:
      - name: api
        port: 8687
        targetPort: 8687
        protocol: TCP

  ingress:
    enabled: false

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: false
    hostPath:
      enabled: false

  tolerations:
    - operator: Exists
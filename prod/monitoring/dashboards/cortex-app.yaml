apiVersion: v1
kind: ConfigMap
metadata:
  name: cortex-app-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Application"
data:
  cortex-app.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "title": "Request Rate",
          "type": "stat",
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "targets": [{ "expr": "sum(rate(http_requests_total{namespace=\"cortex-app\"}[5m]))", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 0.01}] } } },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "title": "Error Rate (5xx)",
          "type": "stat",
          "targets": [{ "expr": "sum(rate(http_requests_total{namespace=\"cortex-app\", status=~\"5..\"}[5m])) / sum(rate(http_requests_total{namespace=\"cortex-app\"}[5m])) or vector(0)", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "title": "p95 Latency",
          "type": "stat",
          "targets": [{ "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"cortex-app\"}[5m])))", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}] } } },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "title": "Running Pods",
          "type": "stat",
          "targets": [{ "expr": "count(kube_pod_status_phase{namespace=\"cortex-app\", phase=\"Running\"})", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 5,
          "title": "Request Rate by Endpoint",
          "type": "timeseries",
          "targets": [{ "expr": "sum by (handler, method) (rate(http_requests_total{namespace=\"cortex-app\"}[5m]))", "legendFormat": "{{method}} {{handler}}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 6,
          "title": "Latency Percentiles",
          "type": "timeseries",
          "targets": [
            { "expr": "histogram_quantile(0.50, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"cortex-app\"}[5m])))", "legendFormat": "p50" },
            { "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"cortex-app\"}[5m])))", "legendFormat": "p95" },
            { "expr": "histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"cortex-app\"}[5m])))", "legendFormat": "p99" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "id": 7,
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "targets": [{ "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"cortex-app\", container=\"cortex-app\"}[5m]))", "legendFormat": "{{pod}}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "id": 8,
          "title": "Pod Memory Usage",
          "type": "timeseries",
          "targets": [{ "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"cortex-app\", container=\"cortex-app\"})", "legendFormat": "{{pod}}" }]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["cortex", "application"],
      "templating": {
        "list": [
          { "current": {}, "hide": 0, "includeAll": false, "label": "Datasource", "name": "datasource", "options": [], "query": "prometheus", "type": "datasource" }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Cortex App",
      "uid": "cortex-app",
      "version": 1
    }

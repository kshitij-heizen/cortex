apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-msk-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Application"
data:
  kafka-msk.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 0 },
          "id": 1,
          "title": "Consumer Lag (Total)",
          "type": "stat",
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1000}, {"color": "red", "value": 10000}] } } },
          "targets": [{ "expr": "sum(kafka_consumer_group_lag{namespace=~\"cortex-app|cortex-ingestion\"}) or vector(0)", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 0 },
          "id": 2,
          "title": "Messages Consumed/sec",
          "type": "stat",
          "fieldConfig": { "defaults": { "unit": "ops" } },
          "targets": [{ "expr": "sum(rate(kafka_consumer_records_consumed_total{namespace=~\"cortex-app|cortex-ingestion\"}[5m])) or vector(0)", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 0 },
          "id": 3,
          "title": "Messages Produced/sec",
          "type": "stat",
          "fieldConfig": { "defaults": { "unit": "ops" } },
          "targets": [{ "expr": "sum(rate(kafka_producer_record_send_total{namespace=~\"cortex-app|cortex-ingestion\"}[5m])) or vector(0)", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 4,
          "title": "Consumer Lag by Group / Topic",
          "type": "timeseries",
          "targets": [{ "expr": "sum by (group, topic) (kafka_consumer_group_lag{namespace=~\"cortex-app|cortex-ingestion\"})", "legendFormat": "{{group}} / {{topic}}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 5,
          "title": "Consumer / Producer Throughput",
          "type": "timeseries",
          "fieldConfig": { "defaults": { "unit": "ops" } },
          "targets": [
            { "expr": "sum by (namespace) (rate(kafka_consumer_records_consumed_total{namespace=~\"cortex-app|cortex-ingestion\"}[5m]))", "legendFormat": "consumed {{namespace}}" },
            { "expr": "sum by (namespace) (rate(kafka_producer_record_send_total{namespace=~\"cortex-app|cortex-ingestion\"}[5m]))", "legendFormat": "produced {{namespace}}" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 12 },
          "id": 6,
          "title": "Kafka Client Errors",
          "type": "timeseries",
          "targets": [
            { "expr": "sum by (namespace) (rate(kafka_consumer_fetch_manager_records_lag_max{namespace=~\"cortex-app|cortex-ingestion\"}[5m]))", "legendFormat": "max lag {{namespace}}" },
            { "expr": "sum by (namespace) (rate(kafka_producer_record_error_total{namespace=~\"cortex-app|cortex-ingestion\"}[5m]))", "legendFormat": "producer errors {{namespace}}" }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["kafka", "msk", "messaging"],
      "templating": {
        "list": [
          { "current": {}, "hide": 0, "includeAll": false, "label": "Datasource", "name": "datasource", "options": [], "query": "prometheus", "type": "datasource" }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "MSK / Kafka",
      "uid": "kafka-msk",
      "version": 1
    }

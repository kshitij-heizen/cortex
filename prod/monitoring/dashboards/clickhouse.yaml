apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Databases"
data:
  clickhouse.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}] } } },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "title": "Queries/sec",
          "type": "stat",
          "targets": [{ "expr": "sum(rate(ClickHouseProfileEvents_Query{namespace=~\"$namespace\"}[5m]))", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}] } } },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "title": "Failed Queries/sec",
          "type": "stat",
          "targets": [{ "expr": "sum(rate(ClickHouseProfileEvents_FailedQuery{namespace=~\"$namespace\"}[5m])) or vector(0)", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "bytes", "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}] } } },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "title": "Memory Usage",
          "type": "stat",
          "targets": [{ "expr": "sum(ClickHouseMetrics_MemoryTracking{namespace=~\"$namespace\"})", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}] } } },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "title": "Active Connections",
          "type": "stat",
          "targets": [{ "expr": "sum(ClickHouseMetrics_TCPConnection{namespace=~\"$namespace\"}) + sum(ClickHouseMetrics_HTTPConnection{namespace=~\"$namespace\"})", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 5,
          "title": "Queries by Type",
          "type": "timeseries",
          "targets": [
            { "expr": "rate(ClickHouseProfileEvents_SelectQuery{namespace=~\"$namespace\"}[5m])", "legendFormat": "select" },
            { "expr": "rate(ClickHouseProfileEvents_InsertQuery{namespace=~\"$namespace\"}[5m])", "legendFormat": "insert" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 6,
          "title": "Memory Tracking Over Time",
          "type": "timeseries",
          "targets": [{ "expr": "ClickHouseMetrics_MemoryTracking{namespace=~\"$namespace\"}", "legendFormat": "{{pod}}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "id": 7,
          "title": "Merge Operations",
          "type": "timeseries",
          "targets": [
            { "expr": "ClickHouseMetrics_Merge{namespace=~\"$namespace\"}", "legendFormat": "active merges" },
            { "expr": "rate(ClickHouseProfileEvents_MergedRows{namespace=~\"$namespace\"}[5m])", "legendFormat": "merged rows/s" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "Bps" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "id": 8,
          "title": "Read / Write Throughput",
          "type": "timeseries",
          "targets": [
            { "expr": "rate(ClickHouseProfileEvents_ReadCompressedBytes{namespace=~\"$namespace\"}[5m])", "legendFormat": "read" },
            { "expr": "rate(ClickHouseProfileEvents_WriteBufferFromFileDescriptorWriteBytes{namespace=~\"$namespace\"}[5m])", "legendFormat": "write" }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["clickhouse", "database"],
      "templating": {
        "list": [
          { "current": {}, "hide": 0, "includeAll": true, "label": "Namespace", "multi": true, "name": "namespace", "options": [], "query": "label_values(ClickHouseMetrics_TCPConnection, namespace)", "refresh": 2, "regex": "clickhouse.*", "type": "query" },
          { "current": {}, "hide": 0, "includeAll": false, "label": "Datasource", "name": "datasource", "options": [], "query": "prometheus", "type": "datasource" }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "ClickHouse",
      "uid": "clickhouse",
      "version": 1
    }

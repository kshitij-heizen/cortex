apiVersion: v1
kind: ConfigMap
metadata:
  name: node-exporter-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Kubernetes"
data:
  node-exporter.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.7}, {"color": "red", "value": 0.9}] } } },
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "title": "CPU Usage per Node",
          "type": "timeseries",
          "targets": [{ "expr": "1 - avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))", "legendFormat": "{{instance}}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.7}, {"color": "red", "value": 0.9}] } } },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "title": "Memory Usage per Node",
          "type": "timeseries",
          "targets": [{ "expr": "1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)", "legendFormat": "{{instance}}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1 } },
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 6 },
          "id": 3,
          "title": "Disk Usage per Node",
          "type": "timeseries",
          "targets": [{ "expr": "1 - (node_filesystem_avail_bytes{mountpoint=\"/\", fstype!=\"rootfs\"} / node_filesystem_size_bytes{mountpoint=\"/\", fstype!=\"rootfs\"})", "legendFormat": "{{instance}}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "Bps" } },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 6 },
          "id": 4,
          "title": "Network Traffic per Node",
          "type": "timeseries",
          "targets": [
            { "expr": "rate(node_network_receive_bytes_total{device!~\"lo|veth.*|docker.*|flannel.*|cali.*|cbr.*\"}[5m])", "legendFormat": "{{instance}} rx" },
            { "expr": "- rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|docker.*|flannel.*|cali.*|cbr.*\"}[5m])", "legendFormat": "{{instance}} tx" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 12 },
          "id": 5,
          "title": "Load Average (1m) per Node",
          "type": "timeseries",
          "targets": [{ "expr": "node_load1", "legendFormat": "{{instance}}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "Bps" } },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 12 },
          "id": 6,
          "title": "Disk I/O per Node",
          "type": "timeseries",
          "targets": [
            { "expr": "rate(node_disk_read_bytes_total[5m])", "legendFormat": "{{instance}} read" },
            { "expr": "- rate(node_disk_written_bytes_total[5m])", "legendFormat": "{{instance}} write" }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["node-exporter", "kubernetes"],
      "templating": {
        "list": [
          { "current": {}, "hide": 0, "includeAll": false, "label": "Datasource", "name": "datasource", "options": [], "query": "prometheus", "type": "datasource" }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Node Exporter / Nodes",
      "uid": "node-exporter-nodes",
      "version": 1
    }

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-ingress-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Kubernetes"
data:
  nginx-ingress.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "title": "Total Requests/sec",
          "type": "stat",
          "targets": [{ "expr": "sum(rate(nginx_ingress_controller_requests[5m]))", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}] } } },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "title": "5xx Errors/sec",
          "type": "stat",
          "targets": [{ "expr": "sum(rate(nginx_ingress_controller_requests{status=~\"5..\"}[5m])) or vector(0)", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "title": "p95 Latency",
          "type": "stat",
          "targets": [{ "expr": "histogram_quantile(0.95, sum by (le) (rate(nginx_ingress_controller_request_duration_seconds_bucket[5m])))", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "title": "Active Connections",
          "type": "stat",
          "targets": [{ "expr": "sum(nginx_ingress_controller_nginx_process_connections{state=\"active\"})", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 5,
          "title": "Request Rate by Ingress",
          "type": "timeseries",
          "targets": [{ "expr": "sum by (ingress) (rate(nginx_ingress_controller_requests[5m]))", "legendFormat": "{{ingress}}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 6,
          "title": "Error Rate by Status Code",
          "type": "timeseries",
          "targets": [{ "expr": "sum by (status) (rate(nginx_ingress_controller_requests{status=~\"[45]..\"}[5m]))", "legendFormat": "{{status}}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "id": 7,
          "title": "Request Duration Percentiles",
          "type": "timeseries",
          "targets": [
            { "expr": "histogram_quantile(0.50, sum by (le) (rate(nginx_ingress_controller_request_duration_seconds_bucket[5m])))", "legendFormat": "p50" },
            { "expr": "histogram_quantile(0.95, sum by (le) (rate(nginx_ingress_controller_request_duration_seconds_bucket[5m])))", "legendFormat": "p95" },
            { "expr": "histogram_quantile(0.99, sum by (le) (rate(nginx_ingress_controller_request_duration_seconds_bucket[5m])))", "legendFormat": "p99" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "Bps" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "id": 8,
          "title": "Upstream Response Size",
          "type": "timeseries",
          "targets": [
            { "expr": "sum by (ingress) (rate(nginx_ingress_controller_response_size_sum[5m]))", "legendFormat": "{{ingress}}" }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["nginx", "ingress"],
      "templating": {
        "list": [
          { "current": {}, "hide": 0, "includeAll": false, "label": "Datasource", "name": "datasource", "options": [], "query": "prometheus", "type": "datasource" }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "NGINX Ingress Controller",
      "uid": "nginx-ingress",
      "version": 1
    }

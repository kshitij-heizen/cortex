apiVersion: v1
kind: ConfigMap
metadata:
  name: milvus-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Databases"
data:
  milvus.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}] } } },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "title": "Total Collections",
          "type": "stat",
          "targets": [{ "expr": "milvus_proxy_collection_num{namespace=~\"$namespace\"}", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "ops", "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}] } } },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "title": "Search Requests/sec",
          "type": "stat",
          "targets": [{ "expr": "sum(rate(milvus_proxy_search_vectors_count{namespace=~\"$namespace\"}[5m]))", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "title": "Search Latency p99",
          "type": "stat",
          "targets": [{ "expr": "histogram_quantile(0.99, sum by (le) (rate(milvus_proxy_sq_latency_bucket{query_type=\"Search\", namespace=~\"$namespace\"}[5m])))", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "ops" } },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "title": "Insert Rate/sec",
          "type": "stat",
          "targets": [{ "expr": "sum(rate(milvus_proxy_insert_vectors_count{namespace=~\"$namespace\"}[5m]))", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 5,
          "title": "Search Latency Percentiles",
          "type": "timeseries",
          "targets": [
            { "expr": "histogram_quantile(0.50, sum by (le) (rate(milvus_proxy_sq_latency_bucket{query_type=\"Search\", namespace=~\"$namespace\"}[5m])))", "legendFormat": "p50" },
            { "expr": "histogram_quantile(0.95, sum by (le) (rate(milvus_proxy_sq_latency_bucket{query_type=\"Search\", namespace=~\"$namespace\"}[5m])))", "legendFormat": "p95" },
            { "expr": "histogram_quantile(0.99, sum by (le) (rate(milvus_proxy_sq_latency_bucket{query_type=\"Search\", namespace=~\"$namespace\"}[5m])))", "legendFormat": "p99" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 6,
          "title": "Insert / Search / Query Rate",
          "type": "timeseries",
          "targets": [
            { "expr": "sum(rate(milvus_proxy_insert_vectors_count{namespace=~\"$namespace\"}[5m]))", "legendFormat": "insert" },
            { "expr": "sum(rate(milvus_proxy_search_vectors_count{namespace=~\"$namespace\"}[5m]))", "legendFormat": "search" },
            { "expr": "sum(rate(milvus_proxy_sq_latency_count{query_type=\"Query\", namespace=~\"$namespace\"}[5m]))", "legendFormat": "query" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "id": 7,
          "title": "Component Memory Usage",
          "type": "timeseries",
          "targets": [{ "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=~\"$namespace\", container!=\"\", container!=\"POD\"})", "legendFormat": "{{pod}}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "id": 8,
          "title": "Component CPU Usage",
          "type": "timeseries",
          "targets": [{ "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\", container!=\"\", container!=\"POD\"}[5m]))", "legendFormat": "{{pod}}" }]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["milvus", "database", "vector"],
      "templating": {
        "list": [
          { "current": {}, "hide": 0, "includeAll": true, "label": "Namespace", "multi": true, "name": "namespace", "options": [], "query": "label_values(milvus_proxy_collection_num, namespace)", "refresh": 2, "regex": "milvus-.*", "type": "query" },
          { "current": {}, "hide": 0, "includeAll": false, "label": "Datasource", "name": "datasource", "options": [], "query": "prometheus", "type": "datasource" }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Milvus",
      "uid": "milvus",
      "version": 1
    }

apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-pods-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Kubernetes"
data:
  k8s-pods.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "targets": [{ "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{container!=\"\", container!=\"POD\", namespace=~\"$namespace\"}[5m]))", "legendFormat": "{{pod}}" }],
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "lastNotNull"] } }
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "title": "Pod Memory Usage",
          "type": "timeseries",
          "targets": [{ "expr": "sum by (pod) (container_memory_working_set_bytes{container!=\"\", container!=\"POD\", namespace=~\"$namespace\"})", "legendFormat": "{{pod}}" }],
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "lastNotNull"] } }
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 6 },
          "id": 3,
          "title": "Pod Restarts",
          "type": "timeseries",
          "targets": [{ "expr": "increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}[1h])", "legendFormat": "{{namespace}}/{{pod}}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "Bps" } },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 6 },
          "id": 4,
          "title": "Pod Network I/O",
          "type": "timeseries",
          "targets": [
            { "expr": "sum by (pod) (rate(container_network_receive_bytes_total{namespace=~\"$namespace\"}[5m]))", "legendFormat": "{{pod}} rx" },
            { "expr": "- sum by (pod) (rate(container_network_transmit_bytes_total{namespace=~\"$namespace\"}[5m]))", "legendFormat": "{{pod}} tx" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 12 },
          "id": 5,
          "title": "Container Status",
          "type": "table",
          "targets": [{ "expr": "kube_pod_container_status_ready{namespace=~\"$namespace\"}", "legendFormat": "", "format": "table", "instant": true }],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true, "__name__": true, "uid": true, "job": true, "instance": true, "endpoint": true, "service": true }, "renameByName": {} } }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["kubernetes", "pods"],
      "templating": {
        "list": [
          { "current": {}, "hide": 0, "includeAll": true, "label": "Namespace", "multi": true, "name": "namespace", "options": [], "query": "label_values(kube_pod_info, namespace)", "refresh": 2, "type": "query" },
          { "current": {}, "hide": 0, "includeAll": false, "label": "Datasource", "name": "datasource", "options": [], "query": "prometheus", "type": "datasource" }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Kubernetes Pods",
      "uid": "k8s-pods",
      "version": 1
    }
